# ORCHESTRA studio config — copy to config/studio.yaml and edit.
# The whole studio is defined in this one file. Version it in git
# (studio.yaml itself is gitignored; keep this example current).

# Where sessions are recorded. LOCAL SSD ONLY — never a network path.
# Finished sessions are rsynced to the NAS after the fact.
# An external drive under /Volumes/... is fine (it's local): the daemon
# refuses to boot or start a session when that volume is not mounted, and
# /health goes red if it unmounts mid-session.
recordingsRoot: "~/Recordings"

nas:
  # Set true once the UGREEN NAS is reachable over SSH with key auth.
  enabled: false
  # Hostname or static IP of the NAS (DHCP reservation — no mDNS).
  host: "192.168.1.50"
  # Absolute path on the NAS where session folders land.
  remotePath: "/volume1/studio/sessions"
  # rsync flags. --checksum verifies content; --partial resumes big files.
  rsyncFlags: ["-a", "--checksum", "--partial"]

obs:
  # OBS 28+: Tools -> WebSocket Server Settings -> Enable, set password.
  url: "ws://127.0.0.1:4455"
  password: "CHANGE_ME"
  # /session/mark also drops an OBS chapter marker into the recording
  # (OBS 30.2+, Hybrid MP4 output only). Best-effort — safe to leave on.
  chapterMarkers: true
  # OBS source name that captures the program feed (the ATEM USB webcam
  # capture). Required by the capture watchdog below; null disables it.
  captureSource: null            # e.g. "ATEM PROGRAM"
  # Capture watchdog: while recording, watch captureSource for a frozen or
  # dropped feed (the flaky Blackmagic USB capture) and alert instantly via
  # macOS notification + Companion ($(internal:custom_orchestra_capture)).
  captureWatchdog:
    enabled: false
    pollMs: 1000
    freezeSeconds: 4             # frames unchanged/unreadable this long => frozen
    autoRecover: false           # best-effort re-init of the source on freeze

companion:
  # Push state to Companion custom variables so buttons flip color on failure
  # without polling. Enable Companion Settings -> HTTP API first.
  # Currently pushed: orchestra_health = "ok" | "fail" (health transitions).
  # Reference in Companion feedbacks as $(internal:custom_orchestra_health).
  enabled: false
  url: "http://127.0.0.1:8000"

atem:
  # Static IP of the ATEM (Pro-tier units have Ethernet).
  ip: "192.168.1.60"
  # false = Companion drives the ATEM (V1 mode). true = daemon connects
  # directly (needed for /cut/:cam and auto-switching).
  enabled: false

health:
  # /health fails the disk check below this much free space.
  minFreeGB: 50

session:
  # Default folder name template (profiles can override).
  # Available: {date} {time} {slug} {profile}
  nameTemplate: "{date}_{time}_{slug}"

# ---------------------------------------------------------------------------
# Profiles (V2). The one button reads activeProfile; switch profiles from a
# Stream Deck button via POST /profile/:name.
# ---------------------------------------------------------------------------
activeProfile: "default"

profiles:
  podcast:
    nameTemplate: "{date}_{profile}_{slug}"
    fileTemplate: "{date}_{profile}_take{take}"
    obsSceneCollection: "Studio"
    atemDefaultCam: 1
    autoSwitch:
      enabled: true
      cameras: [1, 2, 3]
      minShotSeconds: 5
      maxShotSeconds: 15
      overridePauseSeconds: 20
      audio:
        enabled: true
        obsInput: "Mic/Aux"     # OBS input name driving the closeup rule
        closeupCam: 2
        thresholdDb: -30
        sustainMs: 1500

  music:
    nameTemplate: "{date}_{profile}_{slug}"
    atemDefaultCam: 1
    autoSwitch:
      enabled: true
      cameras: [1, 2, 3, 4]
      minShotSeconds: 3
      maxShotSeconds: 8
      overridePauseSeconds: 15
      audio:
        enabled: false

  dj:
    atemDefaultCam: 2
    autoSwitch:
      enabled: false
    # Scripted cinematic cue lists — POST /sequence/mixingReel/run. Unlike
    # autoSwitch's random rotation, this is a fixed, timed shot list: for a
    # ~90s mixing reel, cut wide -> slider -> overhead -> back to wide.
    # cam numbers below are PLACEHOLDERS — confirm the real ATEM input
    # numbers in ATEM Software Control (Video tab) before using this; do
    # not assume the labels on the ATEM's input cables match these numbers.
    sequences:
      mixingReel:
        - { cam: 1, holdMs: 20000, label: "DJ booth wide" }
        - { cam: 2, holdMs: 12000, label: "cam slider" }
        - { cam: 3, holdMs: 15000, label: "overhead" }
        - { cam: 1, holdMs: 15000, label: "DJ booth wide" }
        - { cam: 2, holdMs: 12000, label: "cam slider" }
        - { cam: 4, holdMs: 16000, label: "rear screen cutaway" }
        # ~90s total — trim/reorder cues to match the actual reel length.
    # Beat-reactive director — fast, music-driven cutting (POST /reactive/arm
    # or /go with reactive:true). Reads the OBS input carrying the MUSIC and
    # cuts on beats; shots shorten on drops, stretch on breakdowns. Tuned here
    # for short-form TEASER pacing: the slowest dwell is maxShotMs+beatGraceMs
    # (~4s), drops cut as fast as minShotMs (~1s).
    beatReactive:
      enabled: false
      cameras: [1, 2]
      wideCam: 1                        # favoured when quiet
      closeupCam: 2                     # favoured when loud
      obsInput: "Audio Input Capture"   # the MUSIC input (not the mic)
      minShotMs: 1000
      maxShotMs: 3500                   # hard dwell ceiling (teaser pace)
      onsetRiseDb: 6                    # dB rise above baseline = a beat
      refractoryMs: 250
      beatGraceMs: 400
      envelopeAlpha: 0.05
      energyFloorDb: -45
      energyCeilDb: -18                 # lower => reaches "high energy" sooner
      lowEnergy: 0.3
      highEnergy: 0.6
      overridePauseMs: 6000

  content:
    nameTemplate: "{date}_{time}_{slug}"
    autoSwitch:
      enabled: false

http:
  # Companion calls the daemon here (Generic HTTP module).
  port: 8722
  host: "127.0.0.1"
